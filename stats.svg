<svg xmlns="http://www.w3.org/2000/svg"
  width="495" height="140"
  viewBox="0 0 495 140"
  role="img"
  aria-label="Top programming languages for NaXeMate">

  <title>Top Languages – NaXeMate</title>

  <style>
    .card      { fill: #161b22; stroke: #30363d; stroke-width: 1; }
    .title     { font: 600 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #00D9FF; }
    .updated   { font: 400 10px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #484f58; }
    .lang-name { font: 500 11px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #c9d1d9; }
    .lang-pct  { font: 600 11px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; }
  </style>

  <defs>
    <!-- Clip all bar segments to the rounded bar shape -->
    <clipPath id="bar-clip">
      <rect x="20" y="52" width="455" height="10" rx="5" />
    </clipPath>
  </defs>

  <!-- Card background -->
  <rect width="495" height="140" rx="6" ry="6" class="card" />

  <!-- Title -->
  <text x="20" y="30" class="title">⚡ Languages Used</text>

  <!-- Last updated -->
  <text x="475" y="30" class="updated" text-anchor="end">Updated May 14, 2026</text>

  <!-- Stacked bar background track -->
  <rect x="20" y="52" width="455" height="10" rx="5" fill="#21262d" />

  <!-- Stacked bar segments (clipped to rounded track) -->
  <g clip-path="url(#bar-clip)">
    <rect x="20.00" y="52" width="201.41" height="10" fill="#b07219" />
    <rect x="221.41" y="52" width="67.27" height="10" fill="#563d7c" />
    <rect x="288.69" y="52" width="65.61" height="10" fill="#8b949e" />
    <rect x="354.29" y="52" width="58.84" height="10" fill="#e34c26" />
    <rect x="413.13" y="52" width="54.56" height="10" fill="#3178c6" />
    <rect x="467.69" y="52" width="7.31" height="10" fill="#f1e05a" />
  </g>

  <!-- Legend -->
  
    <g transform="translate(20, 76)">
      <circle cx="5" cy="5" r="5" fill="#b07219" />
      <text x="14" y="9" class="lang-name">Java</text>
      <text x="14" y="9" class="lang-pct" dx="28.8">44.27%</text>
    </g>
    <g transform="translate(171.66666666666666, 76)">
      <circle cx="5" cy="5" r="5" fill="#563d7c" />
      <text x="14" y="9" class="lang-name">CSS</text>
      <text x="14" y="9" class="lang-pct" dx="21.6">14.78%</text>
    </g>
    <g transform="translate(323.3333333333333, 76)">
      <circle cx="5" cy="5" r="5" fill="#8b949e" />
      <text x="14" y="9" class="lang-name">C#</text>
      <text x="14" y="9" class="lang-pct" dx="14.4">14.42%</text>
    </g>
    <g transform="translate(20, 98)">
      <circle cx="5" cy="5" r="5" fill="#e34c26" />
      <text x="14" y="9" class="lang-name">HTML</text>
      <text x="14" y="9" class="lang-pct" dx="28.8">12.93%</text>
    </g>
    <g transform="translate(171.66666666666666, 98)">
      <circle cx="5" cy="5" r="5" fill="#3178c6" />
      <text x="14" y="9" class="lang-name">TypeScript</text>
      <text x="14" y="9" class="lang-pct" dx="72">11.99%</text>
    </g>
    <g transform="translate(323.3333333333333, 98)">
      <circle cx="5" cy="5" r="5" fill="#f1e05a" />
      <text x="14" y="9" class="lang-name">JavaScript</text>
      <text x="14" y="9" class="lang-pct" dx="72">1.61%</text>
    </g>
</svg>